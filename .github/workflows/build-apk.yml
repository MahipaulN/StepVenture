name: Build StepVenture APK

on:
  workflow_dispatch:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: List files before unzip
        run: ls -la

      - name: Unzip project
        run: unzip -o StepVenture.zip -d extracted

      - name: List extracted contents
        run: ls -la extracted/

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build Debug APK
        working-directory: extracted/StepVenture
        run: gradle assembleDebug --stacktrace

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: StepVenture-APK
          path: extracted/StepVenture/app/build/outputs/apk/debug/app-debug.apk
